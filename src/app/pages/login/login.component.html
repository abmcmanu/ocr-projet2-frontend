<div class="card m-3">
  <h5 class="card-header">Login</h5>
  <div class="card-body">

    @if (errorMessage) {
      <div class="alert alert-danger" role="alert">
        {{ errorMessage }}
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Login</label>
        <input
          type="text"
          formControlName="login"
          class="form-control"
          [ngClass]="{ 'is-invalid': submitted && form['login'].errors }"
        />
        @if (submitted && form['login'].errors) {
          <div class="invalid-feedback">
            @if (form['login'].errors?.['required']) {
              <div>Le login est obligatoire</div>
            }
          </div>
        }
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input
          type="password"
          formControlName="password"
          class="form-control"
          [ngClass]="{ 'is-invalid': submitted && form['password'].errors }"
        />
        @if (submitted && form['password'].errors) {
          <div class="invalid-feedback">
            @if (form['password'].errors?.['required']) {
              <div>Le mot de passe est obligatoire</div>
            }
          </div>
        }
      </div>

      <div class="text-center mt-3">
        <button class="btn btn-primary mr-1" [disabled]="loading">
          @if (loading) {
            <span>Connexion en cours...</span>
          } @else {
            <span>Se connecter</span>
          }
        </button>
        <button class="btn btn-secondary" type="reset" (click)="onReset()">
          Annuler
        </button>
      </div>
    </form>
  </div>
</div>
