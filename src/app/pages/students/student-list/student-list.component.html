<div class="container">
  <div class="header-row">
    <h2>Liste des étudiants</h2>
    <div class="actions-group">
      <button mat-raised-button color="primary" (click)="goToCreate()">
        + Ajouter un étudiant
      </button>
      <button mat-raised-button color="warn" (click)="logout()">
        <mat-icon>logout</mat-icon> Déconnexion
      </button>
    </div>
  </div>

  @if (errorMessage) {
    <div class="alert alert-danger">{{ errorMessage }}</div>
  }

  @if (loading) {
    <div class="center-spinner">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  } @else {
    <table mat-table [dataSource]="students" class="mat-elevation-z2 full-width">

      <ng-container matColumnDef="firstName">
        <th mat-header-cell *matHeaderCellDef>Prénom</th>
        <td mat-cell *matCellDef="let s">{{ s.firstName }}</td>
      </ng-container>

      <ng-container matColumnDef="lastName">
        <th mat-header-cell *matHeaderCellDef>Nom</th>
        <td mat-cell *matCellDef="let s">{{ s.lastName }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let s">{{ s.email }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let s">
          <button mat-icon-button color="primary" (click)="goToDetail(s.id)" title="Détail">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(s.id)" title="Supprimer">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    @if (students.length === 0) {
      <p class="empty-msg">Aucun étudiant enregistré.</p>
    }
  }
</div>
